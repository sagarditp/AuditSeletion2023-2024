<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Selection Search 2023-2024</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --blue: #1a73e8; --blue-dark: #1557b0; --blue-light: #e8f0fe; --gray-200: #e8eaed; --gray-900: #202124; --radius: 12px; }
        body { font-family: 'Hind Siliguri', sans-serif; background: linear-gradient(135deg, #e8f0fe 0%, #f0f4ff 100%); min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; height: fit-content; }
        .header { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); padding: 30px 20px; text-align: center; color: #fff; }
        .content { padding: 25px; }
        .search-box input { width: 100%; padding: 15px; border: 2px solid var(--gray-200); border-radius: var(--radius); outline: none; font-size: 16px; transition: 0.3s; background: #f9f9f9; }
        .search-box input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 4px rgba(26,115,232,0.1); }
        .btn-search { width: 100%; padding: 15px; border: none; border-radius: var(--radius); background: var(--blue); color: #fff; font-weight: 700; cursor: pointer; margin-top: 15px; font-size: 16px; }
        #loader { display: none; text-align: center; margin-top: 15px; color: #666; font-size: 14px; }
        #searchResult { display: none; margin-top: 20px; border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .result-header { background: var(--blue-light); padding: 12px; font-weight: 700; color: var(--blue-dark); text-align: center; }
        .data-row { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 15px; }
        .data-row:last-child { border-bottom: none; }
        .footer { background: #202124; color: #ddd; padding: 20px; font-size: 13px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin-bottom: 5px;">Audit Selection Search</h2>
        <p style="font-size: 14px; opacity: 0.9;">কর বর্ষ ২০২৩–২০২৪</p>
    </div>

    <div class="content">
        <div class="search-box">
            <input type="text" id="searchID" placeholder="আপনার ১২ ডিজিটের TIN লিখুন..." onkeypress="if(event.keyCode==13) findAudit()">
        </div>
        <button class="btn-search" onclick="findAudit()">অনুসন্ধান করুন</button>
        <div id="loader">⏳ ডেটা লোড হচ্ছে (৭২,৩৩০+ রো)...</div>
        <div id="searchResult"></div>
    </div>

    <div class="footer">
        <b>সাগর দাশ</b>
        সদস্য, সিলেট জেলা কর আইনজীবী সমিতি<br>
        📞 01687036519 | <a href="https://sagar.pro.bd" style="color:#8ab4f8; text-decoration:none;">sagar.pro.bd</a>
    </div>
</div>

<script>
    let auditData = [];
    const csvFile = "Audit Selection 2023-2024.xlsx - Sheet1.csv";

    // পেজ লোড হওয়ার সাথে সাথে CSV থেকে ডেটা মেমোরিতে নিবে
    window.onload = function() {
        const loader = document.getElementById('loader');
        loader.style.display = "block";
        
        Papa.parse(csvFile, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                auditData = results.data;
                loader.style.display = "none";
                console.log("Total Loaded:", auditData.length);
            },
            error: function() {
                loader.innerHTML = "❌ ডেটা ফাইল পাওয়া যায়নি।";
            }
        });
    };

    function findAudit() {
        const id = document.getElementById('searchID').value.trim();
        const resDiv = document.getElementById('searchResult');
        
        if (!id) return alert("দয়া করে TIN নম্বর দিন।");
        if (auditData.length === 0) return alert("ডেটা এখনো লোড হচ্ছে, দয়া করে ২ সেকেন্ড অপেক্ষা করুন।");

        // ৭২ হাজার ডেটার মধ্যে দ্রুত সার্চ করার লজিক
        const found = auditData.find(row => {
            if (!row.TIN) return false;
            let tinStr = row.TIN.toString().trim();
            // Scientific notation (4.58E+11) handle করার জন্য parseFloat ব্যবহার করা হয়েছে
            return tinStr === id || parseFloat(tinStr).toString() === id;
        });

        if (found) {
            resDiv.style.display = "block";
            resDiv.innerHTML = `
                <div class="result-header">✅ অডিট তালিকায় পাওয়া গেছে</div>
                <div class="data-row"><span>TIN:</span><b>${found.TIN}</b></div>
                <div class="data-row"><span>Zone:</span><b>${found.Zone}</b></div>
                <div class="data-row"><span>Circle:</span><b>${found.Circle}</b></div>
                <div class="data-row"><span>Year:</span><b>2023-2024</b></div>
            `;
        } else {
            resDiv.style.display = "block";
            resDiv.innerHTML = "<p style='padding:20px; color:red; text-align:center; font-weight:bold;'>❌ এই TIN অডিট তালিকায় নেই।</p>";
        }
    }
</script>

</body>
</html>
