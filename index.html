<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Selection Search 2023-2024</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --blue: #1a73e8; --blue-dark: #1557b0; --blue-light: #e8f0fe; --gray-200: #e8eaed; --gray-900: #202124; --radius: 12px; }
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; height: fit-content; }
        .header { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); padding: 30px 20px; text-align: center; color: #fff; }
        .content { padding: 25px; }
        .search-box input { width: 100%; padding: 15px; border: 2px solid var(--gray-200); border-radius: var(--radius); outline: none; font-size: 16px; background: #f9f9f9; text-align: center; }
        .btn-search { width: 100%; padding: 15px; border: none; border-radius: var(--radius); background: var(--blue); color: #fff; font-weight: 700; cursor: pointer; margin-top: 15px; font-size: 16px; }
        #status { text-align: center; margin-top: 10px; font-size: 13px; color: #666; }
        #searchResult { display: none; margin-top: 20px; border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; background: #fff; }
        .result-header { background: var(--blue-light); padding: 12px; font-weight: 700; color: var(--blue-dark); text-align: center; }
        .data-row { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 15px; }
        .footer { background: #202124; color: #ddd; padding: 20px; font-size: 13px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin-bottom: 5px;">Audit Selection Search</h2>
        <p style="font-size: 14px; opacity: 0.9;">কর বর্ষ ২০২৩–২০২৪</p>
    </div>

    <div class="content">
        <div class="search-box">
            <input type="number" id="searchID" placeholder="আপনার ১২ ডিজিটের TIN লিখুন..." onkeypress="if(event.keyCode==13) findAudit()">
        </div>
        <button class="btn-search" onclick="findAudit()">অনুসন্ধান করুন</button>
        <div id="status">⏳ ফাইল লোড হচ্ছে...</div>
        <div id="searchResult"></div>
    </div>

    <div class="footer">
        <b>সাগর দাশ</b>
        সদস্য, সিলেট জেলা কর আইনজীবী সমিতি<br>
        📞 01687036519
    </div>
</div>

<script>
    let auditData = [];
    // ফাইলের নাম একদম হুবহু হতে হবে
    const csvFile = "Audit Selection 2023-2024.csv";

    window.onload = function() {
        const status = document.getElementById('status');
        Papa.parse(csvFile, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                auditData = results.data;
                status.innerHTML = "✅ " + auditData.length + " টি ডেটা তৈরি আছে।";
                console.log("Data Loaded.");
            },
            error: function() {
                status.innerHTML = "❌ ডেটা ফাইল পাওয়া যায়নি। ফাইলের নাম চেক করুন।";
            }
        });
    };

    function findAudit() {
        const id = document.getElementById('searchID').value.trim();
        const resDiv = document.getElementById('searchResult');
        
        if (!id) { alert("TIN নম্বর লিখুন।"); return; }
        if (auditData.length === 0) { alert("ডেটা এখনো লোড হয়নি।"); return; }

        // TIN কলামে সার্চ
        const found = auditData.find(row => {
            return row.TIN && row.TIN.toString().trim() === id;
        });

        if (found) {
            resDiv.style.display = "block";
            resDiv.innerHTML = `
                <div class="result-header">✅ অডিট তালিকায় পাওয়া গেছে</div>
                <div class="data-row"><span>TIN:</span><b>${found.TIN}</b></div>
                <div class="data-row"><span>Zone:</span><b>${found.Zone}</b></div>
                <div class="data-row"><span>Circle:</span><b>${found.Circle}</b></div>
                <div class="data-row"><span>Year:</span><b>${found['Assesment Year']}</b></div>
            `;
        } else {
            resDiv.style.display = "block";
            resDiv.innerHTML = "<p style='padding:20px; color:red; text-align:center; font-weight:bold;'>❌ এই TIN অডিট তালিকায় নেই।</p>";
        }
    }
</script>

</body>
</html>
