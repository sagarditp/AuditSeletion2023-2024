<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Selection Search 2023-2024</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --blue: #1a73e8; --blue-dark: #1557b0; --blue-light: #e8f0fe; --gray-200: #e8eaed; --gray-700: #5f6368; --gray-900: #202124; --text: #3c4043; --radius: 12px; }
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f4ff; display: flex; justify-content: center; padding: 24px 16px; }
        .container { width: 100%; max-width: 520px; background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); overflow: hidden; }
        .header { background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%); padding: 28px 24px; text-align: center; color: #fff; }
        .content { padding: 28px 24px; }
        .search-box input { width: 100%; padding: 14px; border: 2px solid var(--gray-200); border-radius: var(--radius); outline: none; margin-bottom: 12px; }
        .btn-search { width: 100%; padding: 14px; border: none; border-radius: var(--radius); background: var(--blue); color: #fff; font-weight: 700; cursor: pointer; }
        #searchResult { display: none; margin-top: 20px; border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; }
        .result-header { background: var(--blue-light); padding: 12px; font-weight: 700; color: var(--blue-dark); }
        .data-row { display: flex; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #eee; font-size: 14px; }
        .loading { text-align: center; display: none; padding: 10px; color: var(--gray-500); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Audit Selection Search</h2>
        <p>কর বর্ষ ২০২৩–২০২৪</p>
    </div>
    <div class="content">
        <input type="text" id="searchID" class="search-box" style="width:100%;" placeholder="TIN লিখে এন্টার দিন...">
        <button class="btn-search" onclick="findAudit()">অনুসন্ধান করুন</button>
        <div id="loader" class="loading">⏳ ডেটা লোড হচ্ছে, দয়া করে অপেক্ষা করুন...</div>
        <div id="searchResult"></div>
    </div>
</div>

<script>
    let auditData = [];
    const csvFileName = "Audit Selection 2023-2024.xlsx - Sheet1.csv";

    // পেজ লোড হওয়ার সাথে সাথে ডেটা পড়া শুরু করবে
    window.onload = function() {
        document.getElementById('loader').style.display = "block";
        Papa.parse(csvFileName, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                auditData = results.data;
                document.getElementById('loader').style.display = "none";
                console.log("Total rows loaded:", auditData.length);
            }
        });
    };

    function findAudit() {
        const id = document.getElementById('searchID').value.trim();
        const resDiv = document.getElementById('searchResult');
        
        if (!auditData.length) return alert("ডেটা এখনো লোড হচ্ছে, কয়েক সেকেন্ড পর চেষ্টা করুন।");
        if (!id) return alert("TIN নম্বর লিখুন।");

        resDiv.style.display = "none";
        
        // অত্যন্ত সতর্কতার সাথে সার্চ করা হচ্ছে (Scientific notation handle করে)
        let found = auditData.find(row => {
            if (!row.TIN) return false;
            let csvTin = row.TIN.toString().trim();
            // যদি ফাইলে TIN বৈজ্ঞানিক সংকেতে থাকে (যেমন 4.58E+11), তবে এটি ইনপুটের সাথে মিলবে
            return csvTin === id || parseFloat(csvTin).toString() === id;
        });

        if (found) {
            resDiv.style.display = "block";
            resDiv.innerHTML = `
                <div class="result-header">✅ অডিট তালিকায় পাওয়া গেছে</div>
                <div class="data-row"><span>TIN:</span><b>${found.TIN}</b></div>
                <div class="data-row"><span>Zone:</span><b>${found.Zone}</b></div>
                <div class="data-row"><span>Circle:</span><b>${found.Circle}</b></div>
            `;
        } else {
            resDiv.style.display = "block";
            resDiv.innerHTML = "<p style='padding:15px; color:red; text-align:center;'>❌ অডিট তালিকায় এই TIN পাওয়া যায়নি।</p>";
        }
    }
</script>
</body>
</html>
