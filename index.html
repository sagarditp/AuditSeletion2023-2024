<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Selection Search</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css">
    
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .table-header { background-color: #007bff; color: white; border-radius: 10px 10px 0 0; padding: 15px; }
        .dataTables_filter { margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="table-header">
            <h4 class="m-0 text-center">Audit Selection List 2023-2024</h4>
        </div>
        <div class="card-body">
            <table id="auditTable" class="table table-striped table-bordered" style="width:100%">
                <thead>
                    <tr>
                        <th>SL</th>
                        <th>TIN</th>
                        <th>Zone</th>
                        <th>Circle</th>
                        <th>Submission Type</th>
                        <th>Assessment Year</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.print.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
    $(document).ready(function() {
        // CSV Load
        Papa.parse("Audit Selection 2023-2024.xlsx - Sheet1.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                $('#auditTable').DataTable({
                    data: results.data,
                    columns: [
                        { data: "SL" },
                        { data: "TIN" },
                        { data: "Zone" },
                        { data: "Circle" },
                        { data: "Submission Type" },
                        { data: "Assesment Year" }
                    ],
                    dom: '<"d-flex justify-content-between"Bf>rtip', // Export buttons and search bar position
                    buttons: [
                        'excelHtml5', 'pdfHtml5', 'print'
                    ],
                    language: {
                        search: "Search (TIN/Zone/Circle):",
                        lengthMenu: "Show _MENU_ entries"
                    },
                    pageLength: 10
                });
            }
        });
    });
</script>

</body>
</html>
