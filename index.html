<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Selection List 2023-2024</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css">
    
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { margin-top: 40px; margin-bottom: 40px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .card-header { background-color: #1a73e8; color: white; border-radius: 12px 12px 0 0 !important; padding: 20px; }
        .table thead { background-color: #f8f9fa; }
        .dataTables_filter input { border-radius: 20px; padding: 5px 15px; border: 1px solid #ddd; }
        .dt-buttons .btn { border-radius: 5px; font-size: 14px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header text-center">
            <h3 class="mb-0">Audit Selection List 2023-2024</h3>
        </div>
        <div class="card-body">
            <table id="auditTable" class="table table-hover table-bordered w-100">
                <thead>
                    <tr>
                        <th>SL</th>
                        <th>TIN</th>
                        <th>Zone</th>
                        <th>Circle</th>
                        <th>Submission Type</th>
                        <th>Assesment Year</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.print.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
    $(document).ready(function() {
        // CSV ফাইলটি পড়ার জন্য PapaParse ব্যবহার করা হয়েছে
        Papa.parse("Audit Selection 2023-2024.xlsx - Sheet1.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                $('#auditTable').DataTable({
                    data: results.data,
                    columns: [
                        { data: "SL" },
                        { data: "TIN" },
                        { data: "Zone" },
                        { data: "Circle" },
                        { data: "Submission Type" },
                        { data: "Assesment Year" }
                    ],
                    dom: '<"d-flex justify-content-between align-items-center mb-3"Bf>rt<"d-flex justify-content-between align-items-center mt-3"ip>',
                    buttons: [
                        { extend: 'excel', className: 'btn btn-success btn-sm' },
                        { extend: 'pdf', className: 'btn btn-danger btn-sm' },
                        { extend: 'print', className: 'btn btn-primary btn-sm' }
                    ],
                    language: {
                        search: "Search TIN/Circle/Zone:",
                        searchPlaceholder: "Type here..."
                    },
                    pageLength: 20,
                    responsive: true
                });
            }
        });
    });
</script>

</body>
</html>
